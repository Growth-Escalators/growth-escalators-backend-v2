name: Wizmatch Dice Scraper

on:
  workflow_dispatch:

# Schedule intentionally disabled until explicit human approval.
# Proposed cadence after approval:
#   schedule:
#     # Daily at 8 AM IST (2:30 UTC)
#     - cron: '30 2 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright package
        run: npm install --no-save playwright@1.59.1

      - name: Install Playwright browsers
        run: node_modules/.bin/playwright install --with-deps chromium

      - name: Run Dice scraper
        env:
          API_BASE_URL: ${{ secrets.RAILWAY_INTERNAL_API_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          node -e '
          const { chromium } = require("playwright");
          const queries = [
            "Java developer contract", "Python developer W2",
            "DevOps engineer C2C", "React developer remote",
            "Data engineer contract", ".NET developer contract",
            "AWS architect contract", "Full stack developer C2C"
          ];

          (async () => {
            if (!process.env.API_BASE_URL || !process.env.INTERNAL_TOKEN) {
              console.error("Missing API_BASE_URL or INTERNAL_TOKEN secret");
              process.exit(1);
            }
            const browser = await chromium.launch({ headless: true });
            const allSignals = [];

            for (const query of queries) {
              const page = await browser.newPage();
              try {
                await page.goto(`https://www.dice.com/jobs?q=${encodeURIComponent(query)}&countryCode=US&radius=30&radiusUnit=mi&page=1&pageSize=20`, {
                  timeout: 30000,
                  waitUntil: "domcontentloaded",
                });
                // Wait for job cards (JS renders after first paint). Fallback to
                // fixed wait if the selector never appears.
                await page.waitForSelector("a[href*=\"/job-detail/\"]", { timeout: 15000 }).catch(() => {});
                await page.waitForTimeout(1500);
                // Scroll once to trigger any lazy-load on the search list.
                await page.evaluate(() => window.scrollBy(0, 800));
                await page.waitForTimeout(800);

                const { jobs, diag } = await page.evaluate(() => {
                  // Selector strategy: URL-pattern based (stable across their
                  // frontend refactors) with a fallback to legacy id="position-*".
                  const titleLinks = Array.from(document.querySelectorAll(
                    "a[href*=\"/job-detail/\"]"
                  ));
                  const results = [];
                  const seen = new Set();
                  for (const a of titleLinks) {
                    const href = a.getAttribute("href") || "";
                    if (!href || seen.has(href)) continue;
                    seen.add(href);
                    const title = (a.textContent || "").trim();
                    if (!title) continue;
                    // Walk up to the nearest card container (article, or the
                    // ancestor that also contains a /company-profile/ link).
                    let card = a.closest("article, [id^=\"position-\"], [data-cy=\"search-result-card\"], [role=\"listitem\"]");
                    if (!card) {
                      let node = a.parentElement;
                      for (let i = 0; i < 6 && node; i += 1) {
                        if (node.querySelector("a[href*=\"/company-profile/\"]")) {
                          card = node;
                          break;
                        }
                        node = node.parentElement;
                      }
                    }
                    const companyEl = card?.querySelector("a[href*=\"/company-profile/\"]");
                    const company = (companyEl?.textContent || "").trim();
                    const locEl =
                      card?.querySelector("[data-cy=\"search-result-location\"], [data-cy*=\"location\"], [aria-label*=\"location\"], .location span, .location");
                    const location = (locEl?.textContent || "").trim();
                    const url = href.startsWith("http") ? href : `https://www.dice.com${href}`;
                    results.push({ title, company, location, url });
                    if (results.length >= 10) break;
                  }
                  const diag = {
                    titleLinkCount: titleLinks.length,
                    companyLinkCount: document.querySelectorAll("a[href*=\"/company-profile/\"]").length,
                    firstHtml: (document.body?.innerHTML || "").slice(0, 500),
                  };
                  return { jobs: results, diag };
                });

                if (jobs.length === 0) {
                  console.log(`Dice ${query}: 0 jobs (titleLinks=${diag.titleLinkCount}, companyLinks=${diag.companyLinkCount})`);
                  if (diag.titleLinkCount === 0) {
                    console.log(`  first-500 body html: ${diag.firstHtml.replace(/\s+/g, " ").slice(0, 300)}`);
                  }
                } else {
                  console.log(`Dice ${query}: ${jobs.length} jobs`);
                }

                for (const job of jobs) {
                  allSignals.push({
                    job_title: job.title,
                    job_url: job.url,
                    source: "dice",
                    company_name: job.company,
                    location: job.location,
                    employment_type: "contract",
                    keywords: query.toLowerCase().split(" ").slice(0, 4),
                  });
                }
              } catch (e) {
                console.error(`Dice scrape failed for ${query}:`, e.message);
              } finally {
                await page.close();
              }
            }

            await browser.close();

            if (allSignals.length === 0) {
              console.log("No Dice jobs found (selectors may need updating — check per-query diag above)");
              process.exit(0);
            }

            const resp = await fetch(process.env.API_BASE_URL + "/api/wizmatch/signals/ingest", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-internal-secret": process.env.INTERNAL_TOKEN,
              },
              body: JSON.stringify({ signals: allSignals }),
            });
            const body = await resp.text();
            if (!resp.ok) { console.error(`Ingest failed ${resp.status}: ${body}`); process.exit(1); }
            console.log("Ingest response:", body);
            console.log(`Total signals sent: ${allSignals.length}`);
          })().catch(e => { console.error(e); process.exit(1); });
          '
