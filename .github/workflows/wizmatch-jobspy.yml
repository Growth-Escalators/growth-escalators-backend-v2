name: Wizmatch India Job Signals (Naukri)

# Scrapes India IT job listings from Naukri search pages and ingests them as
# wizmatch_job_signals (source=naukri) via the real /signals/ingest endpoint.
# Previously this logged candidates with placeholder emails and never ingested
# anything — Naukri search pages are JOB listings, so this now models them as
# job signals (the actual India-source gap).
#
# ⚠️ KNOWN BLOCKED (verified 2026-07-10, run 29076439988): Naukri sits behind
# Akamai Bot Manager and hard-blocks GitHub Actions datacenter IPs at the edge —
# every request returns "<h1>Access Denied</h1> … errors.edgesuite.net" BEFORE
# any job HTML renders. This is an IP-reputation block, NOT a selector problem:
# no CSS-selector change can fix it. Making this source work needs a residential/
# rotating proxy (paid, separate decision) or a licensed data feed. Until then,
# India demand is sourced manually (Client Discovery seed / CSV) + the working
# auto-engines. Do not waste time "updating selectors".

on:
  workflow_dispatch:

# Schedule intentionally disabled until explicit human approval.
# Proposed cadence after approval:
#   schedule:
#     - cron: '30 4 * * *' # Daily 10 AM IST

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright package
        run: npm install --no-save playwright@1.59.1

      - name: Install Playwright browsers
        run: node_modules/.bin/playwright install --with-deps chromium
      - name: Scrape Naukri job signals and ingest
        env:
          API_BASE_URL: ${{ secrets.RAILWAY_INTERNAL_API_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          node -e '
          const { chromium } = require("playwright");

          const skillCityPairs = [
            { skill: "Java", city: "Bangalore" },
            { skill: "Python", city: "Bangalore" },
            { skill: "React", city: "Bangalore" },
            { skill: ".NET", city: "Delhi" },
            { skill: "DevOps", city: "Hyderabad" },
            { skill: "Java", city: "Pune" },
            { skill: "Python", city: "Chennai" },
            { skill: "React", city: "Hyderabad" },
          ];

          (async () => {
            if (!process.env.API_BASE_URL || !process.env.INTERNAL_TOKEN) {
              console.error("Missing API_BASE_URL or INTERNAL_TOKEN secret");
              process.exit(1);
            }
            const browser = await chromium.launch({ headless: true });
            const signals = [];

            for (const { skill, city } of skillCityPairs) {
              const page = await browser.newPage();
              try {
                const url = `https://www.naukri.com/${skill.toLowerCase().replace(/\./g, "")}-jobs-in-${city.toLowerCase().replace(/\s/g, "-")}`;
                await page.goto(url, { timeout: 30000, waitUntil: "domcontentloaded" });
                // Wait for job cards or fall through to fixed wait.
                await page.waitForSelector(
                  "article.jobTuple, div.srp-jobtuple-wrapper, .jobTuple, [class*=\"jobTuple\"], a[href*=\"/job-listings-\"]",
                  { timeout: 15000 }
                ).catch(() => {});
                await page.waitForTimeout(2000);
                await page.evaluate(() => window.scrollBy(0, 800));
                await page.waitForTimeout(800);

                const { jobs, diag } = await page.evaluate(() => {
                  const out = [];
                  const seen = new Set();

                  // Strategy 1 — legacy + current class-name wrappers.
                  const cards = document.querySelectorAll(
                    "article.jobTuple, div.srp-jobtuple-wrapper, .jobTuple, [class*=\"jobTuple\"], [class*=\"srp-jobtuple\"], [data-job-id]"
                  );
                  cards.forEach((card) => {
                    const titleEl = card.querySelector("a.title, a.title.ellipsis, .title a, .title, a[href*=\"/job-listings-\"]");
                    const companyEl = card.querySelector("a.subTitle, .companyInfo .subTitle, .comp-name, .subTitle, [class*=\"comp-name\"]");
                    const locEl = card.querySelector(".loc .locWdth, .location .ellipsis, .loc span, .location, [class*=\"loc\"]");
                    const title = (titleEl?.textContent || "").trim();
                    const jobUrl = titleEl?.getAttribute("href") || "";
                    const company = (companyEl?.textContent || "").trim();
                    const location = (locEl?.textContent || "").trim();
                    if (title && jobUrl && !seen.has(jobUrl)) {
                      seen.add(jobUrl);
                      out.push({ title, jobUrl, company, location });
                    }
                  });

                  // Strategy 2 — URL-pattern fallback if class-based failed.
                  if (out.length === 0) {
                    document.querySelectorAll("a[href*=\"/job-listings-\"]").forEach((a) => {
                      const href = a.getAttribute("href") || "";
                      const title = (a.textContent || "").trim();
                      if (!href || !title || seen.has(href)) return;
                      seen.add(href);
                      let card = a.parentElement;
                      for (let i = 0; i < 6 && card; i += 1) {
                        if (card.querySelector("a.subTitle, .comp-name, .subTitle")) break;
                        card = card.parentElement;
                      }
                      const companyEl = card?.querySelector("a.subTitle, .comp-name, .subTitle, [class*=\"comp-name\"]");
                      const locEl = card?.querySelector(".loc, .location, [class*=\"loc\"]");
                      out.push({
                        title,
                        jobUrl: href,
                        company: (companyEl?.textContent || "").trim(),
                        location: (locEl?.textContent || "").trim(),
                      });
                    });
                  }

                  const diag = {
                    strategy1Cards: cards.length,
                    strategy2JobLinks: document.querySelectorAll("a[href*=\"/job-listings-\"]").length,
                    firstHtml: (document.body?.innerHTML || "").slice(0, 500),
                  };
                  return { jobs: out.slice(0, 10), diag };
                });

                if (jobs.length === 0) {
                  console.log(`Naukri ${skill} in ${city}: 0 jobs (s1cards=${diag.strategy1Cards}, s2joblinks=${diag.strategy2JobLinks})`);
                  if (diag.strategy1Cards === 0 && diag.strategy2JobLinks === 0) {
                    console.log(`  first-500 body html: ${diag.firstHtml.replace(/\s+/g, " ").slice(0, 300)}`);
                  }
                } else {
                  console.log(`Naukri ${skill} in ${city}: ${jobs.length} jobs`);
                }

                for (const j of jobs) {
                  signals.push({
                    job_title: j.title,
                    job_url: j.jobUrl.startsWith("http") ? j.jobUrl : `https://www.naukri.com${j.jobUrl}`,
                    source: "naukri",
                    location: j.location || city,
                    keywords: [skill],
                    company_name: j.company || undefined,
                  });
                }
              } catch (e) {
                console.error(`Naukri scrape failed for ${skill} in ${city}:`, e.message);
              } finally {
                await page.close();
              }
            }

            await browser.close();

            if (signals.length === 0) {
              console.log("No Naukri job signals found (selectors may need updating — see per-query diag above)");
              process.exit(0);
            }

            const res = await fetch(`${process.env.API_BASE_URL}/api/wizmatch/signals/ingest`, {
              method: "POST",
              headers: { "Content-Type": "application/json", "x-internal-secret": process.env.INTERNAL_TOKEN },
              body: JSON.stringify({ signals }),
            });
            const body = await res.text();
            if (!res.ok) { console.error(`Ingest failed ${res.status}: ${body}`); process.exit(1); }
            console.log(`Ingested ${signals.length} Naukri signals:`, body);
          })().catch(e => { console.error(e); process.exit(1); });
          '
