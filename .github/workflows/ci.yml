name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # A handful of root-level tests (adminFrontendHelpers, wizmatchRouteRegistry,
      # wizmatchFilterPipeline, wizmatchPlacementCommercials) import admin/src/*
      # directly to validate its nav entries/routes, which pulls in admin's own
      # deps (e.g. lucide-react) — not installed by the root npm ci above.
      - name: Install admin dependencies
        run: cd admin && npm ci --legacy-peer-deps

      - name: Build (tsc)
        run: npm run build

      - name: Test + coverage thresholds (vitest)
        run: npm run test:coverage
