[phases.setup]
nixPkgs = ['nodejs_20', 'npm-9_x', 'openssl']

[phases.install]
# Use `npm install --legacy-peer-deps` instead of the default `npm ci` because
# our lockfile has occasional cross-platform esbuild variant gaps after
# regenerating on macOS. `npm install` resolves those at install time; `npm ci`
# refuses to and exits 1. The downside (slightly slower install + lockfile may
# drift) is acceptable for this repo's deploy cadence.
cmds = ['npm install --legacy-peer-deps --include=dev']

[phases.build]
# Backend (tsc → dist/) + admin SPA (vite → public/admin/). The admin
# assets are gitignored — Railway must rebuild them on every deploy or
# the browser hits stale-asset 404s and falls through to the SPA index
# handler, which returns HTML with a text/html MIME on every /assets/*
# URL and the browser refuses to apply it as JS/CSS (white screen).
cmds = [
  'npm install --legacy-peer-deps --prefix admin',
  'npm run admin:build',
  'npm run build',
]
